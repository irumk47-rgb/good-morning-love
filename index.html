<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning Bongi 🌸</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to bottom,#ffd6e7,#fff7c7);
    font-family:Arial,sans-serif;
    overflow:hidden;
    text-align:center;
}

.card{
    background:rgba(255,255,255,0.8);
    padding:30px;
    border-radius:25px;
    width:80%;
    max-width:650px;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

h1{
    color:#ff4f81;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

.float{
    position:absolute;
    animation:up 8s linear infinite;
    pointer-events:none;
}

@keyframes up{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">

<h1>🌸 A Little Morning Surprise 🌸</h1>

<div style="font-size:80px;">🧸</div>

<p id="message">
Click the button for a special message ✨
</p>

<button onclick="showMessage()">💖 Open Surprise 💖</button>

</div>

<script>

const emojis = ["💖","🌸","✨","🌷","🩷"];

for(let i=0;i<40;i++){
    let item=document.createElement("div");
    item.className="float";
    item.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
    item.style.left=Math.random()*100+"vw";
    item.style.fontSize=(20+Math.random()*20)+"px";
    item.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(item);
}

function showMessage(){

document.getElementById("message").innerHTML =
"☀️ Good Morning, Bongi! 💖<br><br>" +
"I hope today brings you lots of smiles, laughter, happiness, and beautiful moments. 🌸✨<br><br>" +
"May your day be as bright as the morning sunshine and as lovely as a field full of flowers. 🌷☀️<br><br>" +
"Take care of yourself, enjoy your day, and keep smiling. 🧸💗<br><br>" +
"💌 From Ameema";

let voice = new SpeechSynthesisUtterance(
'Good Morning Bongi. I hope you have a wonderful day full of smiles and happiness.'
);

voice.rate = 0.9;
voice.pitch = 1.2;

speechSynthesis.speak(voice);

}

</script>

</body>
</html>
